name: claude-review

# Label-gated PR review by Claude Code running headlessly. Posts findings as
# a structured comment on the PR. Costs real API tokens — only fires when
# the PR carries the `claude-review` label.

on:
  pull_request:
    types: [labeled, synchronize, opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'claude-review')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Skip if only .github files changed
        id: gate
        run: |
          set -euo pipefail
          changed=$(git diff --name-only origin/master...HEAD)
          # Run unless EVERY changed path lives under .github/
          if echo "$changed" | grep -qvE '^\.github/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping review — only .github files touched."
          fi

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.gate.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Materialise plugin commands at project level
        # Headless /plugin install isn't first-class yet — copy the plugin's
        # commands into project-level .claude/commands/ so Claude Code finds
        # /review-pr without an interactive install. The plugin stays the
        # canonical source.
        if: steps.gate.outputs.run == 'true'
        run: |
          mkdir -p .claude/commands
          cp marketplaces/cca-prep/plugins/cca-toolkit/commands/*.md .claude/commands/

      - name: Run /review-pr
        if: steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          claude -p "/review-pr" \
            --output-format stream-json \
            --permission-mode bypassPermissions \
            --dangerously-skip-permissions \
            > review-stream.jsonl

          # The final `result` event carries the model's complete text reply.
          # Strip any stray code fences the model added despite the prompt.
          jq -rs '[.[] | select(.type == "result")] | last | .result // empty' \
            review-stream.jsonl | sed -E '/^```/d' > findings.json

          # Fail safe: if the model didn't return valid JSON, fall back to
          # an empty findings array and warn (don't fail the build).
          jq -e . findings.json > /dev/null 2>&1 || {
            echo "::warning::Claude returned non-JSON output. Raw:"
            cat findings.json
            echo "[]" > findings.json
          }

          echo "Findings:"
          jq . findings.json

      - name: Emit + upload audit.jsonl artifact
        # Normalise review-stream.jsonl into the unified AuditRecord shape so
        # project-3's CI runs are inspectable in the same format as project-1
        # and project-2's audit.jsonl. Uploaded as a workflow artifact for
        # 14-day retention — useful for cross-project cost / latency
        # dashboards.
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          jq -c --arg req "${{ github.event.pull_request.number }}" '
            select(.type == "result") | {
              ts: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
              request_id: ("pr-" + $req),
              kind: "api_call",
              tool: "claude-code:/review-pr",
              latency_ms: (.duration_ms // null),
              input_tokens: (.usage.input_tokens // null),
              output_tokens: (.usage.output_tokens // null),
              cache_creation_input_tokens: (.usage.cache_creation_input_tokens // null),
              cache_read_input_tokens: (.usage.cache_read_input_tokens // null)
            }
          ' review-stream.jsonl > audit.jsonl
          echo "audit.jsonl preview:"
          cat audit.jsonl

      - name: Upload audit artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-audit-pr-${{ github.event.pull_request.number }}
          path: audit.jsonl
          retention-days: 14

      - name: Post / update PR comment
        if: steps.gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          MARKER="<!-- claude-review-bot -->"

          # Build a Markdown comment from the findings JSON.
          body=$(jq -r --arg marker "$MARKER" '
            if . == null or . == [] then
              $marker + "\n🤖 **Claude review** — No issues found in the diff. ✅"
            else
              $marker +
              "\n🤖 **Claude review** — \(length) finding(s)\n\n" +
              "| Sev | Category | File | Line | Issue |\n|---|---|---|---:|---|\n" +
              (map("| **\(.severity)** | \(.category) | `\(.file)` | \(.line) | \(.message) |") | join("\n")) +
              "\n\n_Generated by `/review-pr` from the `cca-toolkit` plugin._"
            end
          ' findings.json)

          # Find an existing bot comment via the hidden marker; edit in
          # place if so — keeps PR threads clean across rerun pushes.
          existing=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
            --jq ".comments[] | select(.body | contains(\"$MARKER\")) | .id" | head -n 1)

          if [ -n "$existing" ]; then
            gh api "repos/$REPO/issues/comments/$existing" -X PATCH -f body="$body"
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
          fi
